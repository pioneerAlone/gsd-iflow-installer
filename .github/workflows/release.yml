name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  IFLOW_INSTALL_SCRIPT: "https://gitee.com/iflow-ai/iflow-cli/raw/main/install.sh"

jobs:
  verify-before-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install iFlow CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "Installing iFlow CLI..."
          bash -c "$(curl -fsSL $IFLOW_INSTALL_SCRIPT)" || true
          echo "✅ iFlow CLI installation attempted"

      - name: Install iFlow CLI (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Write-Host "iFlow CLI Windows requires manual setup"
        continue-on-error: true

      - name: Verify scripts (Unix)
        if: runner.os != 'Windows'
        run: |
          cd scripts/unix
          bash -n install.sh
          bash -n update.sh
          bash -n uninstall.sh
          echo "✅ All Unix scripts verified"

      - name: Verify scripts (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $scriptDir = "scripts/windows"
          Get-ChildItem "$scriptDir/*.ps1" | ForEach-Object {
            $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content $_.FullName -Raw), [ref]$null)
            Write-Host "✅ $($_.Name) verified"
          }

  update-release-notes:
    needs: verify-before-release
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update release notes
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## GSD for iFlow CLI
            
            ### 前置要求
            
            请先安装 iFlow CLI：
            ```bash
            bash -c "$(curl -fsSL https://gitee.com/iflow-ai/iflow-cli/raw/main/install.sh)"
            ```
            
            ### 安装方法
            
            **macOS / Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/pioneerAlone/gsd-iflow-installer/main/scripts/unix/install.sh | bash
            ```
            
            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/pioneerAlone/gsd-iflow-installer/main/scripts/windows/install.ps1 | iex
            ```
            
            ### 更新方法
            
            **macOS / Linux:**
            ```bash
            ~/.iflow/update-gsd.sh
            ```
            
            **Windows (PowerShell):**
            ```powershell
            & "$env:USERPROFILE\.iflow\update-gsd.ps1"
            ```
            
            ### 文件结构
            
            ```
            scripts/
            ├── unix/
            │   ├── install.sh
            │   ├── update.sh
            │   └── uninstall.sh
            └── windows/
                ├── install.ps1
                ├── update.ps1
                └── uninstall.ps1
            ```
            
            ---
            
            详细文档请查看 [README.md](https://github.com/pioneerAlone/gsd-iflow-installer#readme)
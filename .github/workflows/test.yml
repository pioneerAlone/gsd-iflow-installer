name: Test Installation Scripts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IFLOW_INSTALL_SCRIPT: "https://gitee.com/iflow-ai/iflow-cli/raw/main/install.sh"

jobs:
  # macOS 测试
  test-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install iFlow CLI
        run: |
          echo "Installing iFlow CLI..."
          bash -c "$(curl -fsSL $IFLOW_INSTALL_SCRIPT)"
          echo "$HOME/.iflow/bin" >> $GITHUB_PATH
        continue-on-error: true

      - name: Verify iFlow CLI installation
        run: |
          if command -v iflow &> /dev/null; then
            echo "✅ iFlow CLI installed successfully"
            iflow --version || echo "iFlow CLI ready"
          else
            echo "⚠️ iFlow CLI installation skipped (GSD can still be installed independently)"
          fi

      - name: Verify script syntax
        run: |
          cd scripts/unix
          bash -n install.sh
          bash -n update.sh
          bash -n uninstall.sh
          echo "✅ All bash scripts syntax OK"

      - name: Test GSD installation
        run: |
          echo "Testing GSD installation..."
          cd scripts/unix
          chmod +x install.sh
          # 仅测试脚本可执行，不实际安装（避免修改 runner 环境）
          ./install.sh --help 2>/dev/null || echo "Install script is ready"
        continue-on-error: true

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts/unix'
          severity: warning
          check_together: 'yes'

  # Linux 测试
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install iFlow CLI
        run: |
          echo "Installing iFlow CLI..."
          bash -c "$(curl -fsSL $IFLOW_INSTALL_SCRIPT)"
          echo "$HOME/.iflow/bin" >> $GITHUB_PATH
        continue-on-error: true

      - name: Verify iFlow CLI installation
        run: |
          if command -v iflow &> /dev/null; then
            echo "✅ iFlow CLI installed successfully"
            iflow --version || echo "iFlow CLI ready"
          else
            echo "⚠️ iFlow CLI installation skipped (GSD can still be installed independently)"
          fi

      - name: Verify script syntax
        run: |
          cd scripts/unix
          bash -n install.sh
          bash -n update.sh
          bash -n uninstall.sh
          echo "✅ All bash scripts syntax OK"

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts/unix'
          severity: warning
          check_together: 'yes'

      - name: Test GSD installation
        run: |
          echo "Testing GSD installation..."
          cd scripts/unix
          chmod +x install.sh
          ./install.sh --help 2>/dev/null || echo "Install script is ready"
        continue-on-error: true

  # Windows 测试
  test-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install iFlow CLI (Windows)
        shell: powershell
        run: |
          Write-Host "Installing iFlow CLI..."
          # Windows 安装脚本（如果有的话）
          # Invoke-WebRequest -Uri "https://gitee.com/iflow-ai/iflow-cli/raw/main/install.ps1" | Invoke-Expression
          Write-Host "⚠️ iFlow CLI Windows installation requires manual setup"
        continue-on-error: true

      - name: Verify PowerShell script syntax
        shell: powershell
        run: |
          $PSVersionTable.PSVersion
          $scriptDir = "scripts/windows"
          
          Get-ChildItem "$scriptDir/*.ps1" | ForEach-Object {
            $errors = $null
            $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content $_.FullName -Raw), [ref]$errors)
            Write-Host "✅ $($_.Name) syntax OK"
          }

      - name: Test GSD installation
        shell: powershell
        run: |
          Write-Host "Testing GSD installation..."
          $scriptDir = "scripts/windows"
          
          # 验证脚本内容有效
          $content = Get-Content "$scriptDir/install.ps1" -Raw
          if ($content -match "GSD for iFlow CLI") {
            Write-Host "✅ install.ps1 content valid"
          } else {
            Write-Host "❌ install.ps1 content invalid"
            exit 1
          }
        continue-on-error: true

  # 综合测试结果
  test-summary:
    needs: [test-macos, test-linux, test-windows]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | ${{ needs.test-macos.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | ${{ needs.test-linux.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows | ${{ needs.test-windows.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Notes" >> $GITHUB_STEP_SUMMARY
          echo "- iFlow CLI is installed before GSD installation test" >> $GITHUB_STEP_SUMMARY
          echo "- Scripts are organized in `scripts/unix/` and `scripts/windows/`" >> $GITHUB_STEP_SUMMARY